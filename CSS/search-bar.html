<style>
  .search-bar {
    font-size: 16px;
    width: 500px;
    border: 1px solid rgb(200, 200, 200);
    padding: 12px 15px;
    border-radius: 20px;
    margin-top: 20px;
    margin-left: 20px;
    transition: box-shadow .15s;
  }

  .search-bar:hover{
    cursor: text;
    box-shadow: 0px 1px 5px rgba(0, 0, 0, 0.25);
  }

  .search-bar:focus{
    outline: none;
  }
</style>

<input class="search-bar" type="text" placeholder="Search Google or type a URL">
